name: Release

on:
  push:
    branches:
    - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
    
    - name: Create .env file
      run: |
        echo "TMBD_API_KEY=${{ secrets.TMBD_API_KEY }}" >> .env
        echo "SUBDL_API_KEY=${{ secrets.SUBDL_API_KEY }}" >> .env

    - name: Decode key.properties
      run: echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" | base64 -d > android/key.properties

    - name: Decode keystore
      run: echo "${{ secrets.ANDROID_KEY_STORE }}" | base64 -d > android/upload-keystore.jks

    - run: flutter pub get
    - run: dart format .
    - run: flutter analyze . --no-fatal-infos --no-fatal-warnings
    - run: flutter build apk

    - name: Extract Version
      id: extract_version
      run: |
        VERSION=$(grep -oP "^version: \K[^\+]+" pubspec.yaml)
        echo "version=v$VERSION" >> $GITHUB_OUTPUT

    - name: Create Tag
      uses: mathieudutour/github-tag-action@v6.1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        custom_tag: ${{ steps.extract_version.outputs.version }}
        tag_prefix: ""

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.extract_version.outputs.version }}
        artifacts: build/app/outputs/apk/release/app-release.apk
        generateReleaseNotes: true