name: Update screenshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots_android:
    name: 'Android - ${{ matrix.device.name }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          - name: "Phone"
            profile: pixel_7_pro
            folder: phone
          - name: "Tablet 7in"
            profile: "7in WSVGA (Tablet)"
            folder: tablet-7in
          - name: "Tablet 10in"
            profile: pixel_tablet
            folder: tablet-10in
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Create .env file
        run: |
          echo "TMBD_API_KEY=${{ secrets.TMBD_API_KEY }}" >> .env
          echo "SUBDL_API_KEY=${{ secrets.SUBDL_API_KEY }}" >> .env

      - run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo swapoff -a || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/julia* /usr/share/java /usr/share/kotlinc
          sudo rm -rf /opt/hostedtoolcache/go /opt/az /opt/microsoft /opt/pipx
          sudo rm -rf /usr/share/miniconda /home/runner/.rustup
          sudo rm -rf /opt/hostedtoolcache/node /opt/google-cloud-sdk
          sudo rm -rf /usr/share/az_* /opt/google /usr/lib/firefox /usr/local/aws-*
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /usr/share/dotnet /usr/share/swift
          sudo rm -rf /usr/local/share/boost /usr/local/share/powershell
          sudo rm -rf /usr/local/graalvm /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/lib/llvm-* /usr/lib/mono
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/*

      - name: Generate screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.device.profile }}
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            flutter drive --driver=test_driver/screenshot_driver.dart --target=integration_test/make_screenshots_test.dart

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.folder }}
          path: screenshots/*.png

  commit_screenshots:
    name: 'Commit and push'
    needs: screenshots_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-screenshots

      - name: Organize screenshots by device
        run: |
          set -euo pipefail
          for folder in phone tablet-7in tablet-10in; do
            src="downloaded-screenshots/screenshots-$folder/"
            if [ -d "$src" ]; then
              mkdir -p "screenshots/$folder"
              cp "$src"*.png "screenshots/$folder/" 2>/dev/null || true
            fi
          done

      - name: Commit screenshots to repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ || true
          if git diff --staged --quiet; then
            echo "No new or changed screenshots to commit."
          else
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git commit -m "Update screenshots"
            git push origin HEAD:"${BRANCH}"
          fi
