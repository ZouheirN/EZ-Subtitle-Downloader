name: Flutter CI

on:
  push:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
    
    - name: Create .env file
      run: |
        echo "TMBD_API_KEY=${{ secrets.TMBD_API_KEY }}" >> .env
        echo "SUBDL_API_KEY=${{ secrets.SUBDL_API_KEY }}" >> .env
    
    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

    - name: Create key.properties
      run: |
        echo "${{ secrets.KEY_PROPERTIES_FILE }}" > android/key.properties
    
    - run: flutter pub get
    - run: dart format .
    - run: flutter analyze . --no-fatal-infos --no-fatal-warnings  # ← won't fail on info/warning
    - run: flutter test
    - run: flutter build apk
    
    - uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/apk/release/app-release.apk
